name: CI Fast (Build & Quality)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run lint warning gate (baseline)
        run: pnpm run lint:gate

      - name: Check types
        run: pnpm run check-types

      - name: Run changed-files test selection
        if: github.event_name == 'pull_request'
        run: pnpm run test:changed

      - name: Audit dependencies (PR)
        if: github.event_name == 'pull_request'
        run: pnpm audit --audit-level=moderate

      - name: Audit dependencies (main)
        if: github.event_name == 'push'
        run: pnpm audit --audit-level=high --production

      - name: Enforce flaky quarantine policy
        if: github.event_name == 'pull_request'
        run: pnpm run test:flaky:policy

      - name: Run quarantined flaky tests (non-blocking)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: pnpm run test:flaky:quarantine

      - name: Upload flaky quarantine summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-summary
          path: test-results/flaky-test-summary.json
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: code-quality
    strategy:
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run quick smoke tests
        run: |
          # Quick smoke test to make sure basic imports work
          NODE_ENV=production node -e "
            try {
              require('./dist/src/index.js');
              console.log('✅ Build successful - basic imports work');
              process.exit(0);
            } catch (error) {
              console.error('❌ Build failed - import error:', error.message);
              process.exit(1);
            }
          "
