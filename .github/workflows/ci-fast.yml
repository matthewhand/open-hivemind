name: CI Fast (Build & Quality)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run lint warning gate (baseline)
        run: pnpm run lint:gate

      - name: Check types
        run: pnpm run check-types

      - name: Run changed-files test selection
        if: github.event_name == 'pull_request'
        run: pnpm run test:changed

      - name: Audit dependencies (PR)
        if: github.event_name == 'pull_request'
        run: pnpm audit --audit-level=high --production

      - name: Audit dependencies (main)
        if: github.event_name == 'push'
        run: pnpm audit --audit-level=high --production

      - name: Enforce flaky quarantine policy
        if: github.event_name == 'pull_request'
        run: pnpm run test:flaky:policy

      - name: Run quarantined flaky tests (non-blocking)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: pnpm run test:flaky:quarantine

      - name: Upload flaky quarantine summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-summary
          path: test-results/flaky-test-summary.json
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: code-quality
    strategy:
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run startup smoke test
        # dist/ is not maintained (tsx runs the app directly via npm run dev).
        # Verify the server starts cleanly instead of requiring a prod build.
        env:
          SKIP_MESSENGERS: 'true'
          HTTP_ENABLED: 'true'
          NODE_ENV: development
        run: |
          timeout 30 npm run start:dev:headless 2>&1 | tee /tmp/smoke.log || true
          if grep -q "Server startup complete" /tmp/smoke.log; then
            echo "✅ Server starts cleanly"
          else
            echo "❌ Server did not reach startup complete"
            cat /tmp/smoke.log
            exit 1
          fi
