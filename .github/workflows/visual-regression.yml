name: Visual Regression Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'webui/client/**'
      - '.github/workflows/visual-regression.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'webui/client/**'
      - '.github/workflows/visual-regression.yml'
  schedule:
    # Run daily at 2 AM UTC to catch any visual regressions (tests only; update via manual dispatch)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update visual snapshots (creates commit on main)'
        required: false
        default: false
        type: boolean

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        include:
          - browser: chromium
            browser-name: Chrome
          - browser: firefox
            browser-name: Firefox
          - browser: webkit
            browser-name: Safari

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'
        cache-dependency-path: webui/client/pnpm-lock.yaml

    - name: Install dependencies
      run: |
        cd webui/client
        pnpm install

    - name: Install Playwright Browsers
      run: |
        cd webui/client
        pnpm dlx playwright install --with-deps ${{ matrix.browser }}

    - name: Run visual regression tests (fail on diff)
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.update_snapshots != 'true'
      run: |
        cd webui/client
        pnpm run build
        pnpm run preview &
        sleep 10
        timeout 60 bash -c 'until curl -f http://localhost:4173; do sleep 2; done'
        pnpm dlx playwright test --project=${{ matrix.browser }}

    - name: Update baseline screenshots (manual only)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_snapshots == 'true'
      run: |
        cd webui/client
        pnpm run build
        pnpm run preview &
        sleep 10
        timeout 60 bash -c 'until curl -f http://localhost:4173; do sleep 2; done'
        pnpm dlx playwright test --project=${{ matrix.browser }} --update-snapshots

    - name: Commit updated baseline (manual update only)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_snapshots == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add webui/client/tests/visual/screenshots/baseline/
        git diff --staged --quiet || git commit -m "chore(visual): update ${{ matrix.browser-name }} baseline screenshots [skip ci]"
        git push

  notify-slack:
    runs-on: ubuntu-latest
    needs: visual-regression
    if: failure() && github.ref == 'refs/heads/main'
    steps:
    - name: Notify Slack on failure
      if: env.SLACK_WEBHOOK_URL != ''
      run: |
        curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚨 Visual regression tests failed on main branch. Check the GitHub Actions for details."}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
