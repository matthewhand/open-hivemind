name: Visual Regression Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'webui/client/**'
      - '.github/workflows/visual-regression.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'webui/client/**'
      - '.github/workflows/visual-regression.yml'
  schedule:
    # Run daily at 2 AM UTC to catch any visual regressions
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update visual snapshots'
        required: false
        default: 'false'
        type: boolean
      test_browsers:
        description: 'Select browsers to test'
        required: true
        default: 'chromium,firefox,webkit'
        type: choice
        options:
          - 'chromium,firefox,webkit'
          - 'chromium,firefox'
          - 'chromium'
          - 'all'

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        include:
          - browser: chromium
            browser-name: Chrome
          - browser: firefox
            browser-name: Firefox
          - browser: webkit
            browser-name: Safari

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: webui/client/package-lock.json
    - name: Install dependencies
      run: |
        cd webui/client
        npm ci

    - name: Install Playwright Browsers
      run: |
        cd webui/client
        npx playwright install chromium

    - name: Update baseline screenshots
      run: |
        cd webui/client
        npm run build
        npm run preview &
        sleep 10
        timeout 60 bash -c 'until curl -f http://localhost:4173; do sleep 2; done'
        npx playwright test --project=chromium --update-snapshots

    - name: Commit updated baseline
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add webui/client/tests/visual/screenshots/baseline/
        git diff --staged --quiet || git commit -m "Update visual baseline screenshots [skip ci]"
        git push

  notify-slack:
    runs-on: ubuntu-latest
    needs: visual-regression
    if: failure() && github.ref == 'refs/heads/main'
    
    steps:
    - name: Notify Slack on failure
      if: env.SLACK_WEBHOOK_URL != ''
      run: |
        curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚨 Visual regression tests failed on main branch. Check the GitHub Actions for details."}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}