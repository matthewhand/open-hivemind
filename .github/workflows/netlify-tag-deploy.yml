name: Netlify Tag-Triggered Deploy

# ──────────────────────────────────────────────────────────────────────────────
# Netlify doesn't support tag-based deploys natively.
#
# Solution: maintain a `release` branch that Netlify watches as its Production
# branch. On every semver tag push (v*), this workflow hard-resets `release` to
# that exact tag, causing Netlify to automatically rebuild and deploy.
#
# Netlify setup required (one-time):
#   Site settings → Build & deploy → Branches
#   → Production branch: release
#
# This prevents "netlify.toml duplicate key" and misconfigured build command
# errors from reaching production — only tagged, reviewed commits hit Netlify.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to force-push the release branch

jobs:
  point-release-at-tag:
    name: Reset release → ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need all tags + branches
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or reset release branch to tag
        run: |
          TAG="${{ github.ref_name }}"
          echo "→ Pointing release branch at tag: $TAG"

          # Ensure the tag is fetched locally
          git fetch --tags

          # Create or hard-reset the release branch to the tagged commit
          git checkout -B release "refs/tags/$TAG"
          git push origin release --force

          echo "✅ release branch now points to $TAG"

      - name: Summary
        run: |
          echo "## Netlify Deploy Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag   | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch| \`release\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Netlify | Will auto-deploy from the \`release\` branch |" >> $GITHUB_STEP_SUMMARY
