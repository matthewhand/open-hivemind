name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
        uses: actions/setup-node@v4
        with:
          node-version: 20
