name: Update Screenshots

on:
  workflow_dispatch:

jobs:
  update-screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
        uses: actions/setup-node@v4
        with:
          node-version: 20
