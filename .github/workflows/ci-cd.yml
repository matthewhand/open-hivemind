name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Audit for hardcoded secrets
        run: pnpm run audit:secrets

      - name: Audit for hardcoded secrets
        run: pnpm run audit:secrets

      - name: Run lint
        run: pnpm run lint

      - name: Check types
        run: pnpm run check-types

      - name: Build
        run: pnpm run build

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Update README badge
