name: Lockfile Integrity

on:
  push:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'src/client/package.json'
      - 'src/client/package-lock.json'
      - 'packages/**/package.json'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'src/client/package.json'
      - 'src/client/package-lock.json'
      - 'packages/**/package.json'

# This workflow validates that package-lock.json is consistent with package.json.
# A mismatch causes `npm ci` to exit with code 1, breaking production installs.
# Root cause of bug fixed in PR #1167: zod version drift between package.json
# (3.25.1) and package-lock.json (resolving to 3.25.76).

jobs:
  lockfile-check:
    runs-on: ubuntu-latest
    name: Validate lockfile consistency

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate root lockfile
        run: |
          echo "→ Checking root package-lock.json..."
          npm ci --dry-run 2>&1
          echo "✅ Root lockfile is consistent"

      - name: Validate client lockfile
        working-directory: src/client
        run: |
          echo "→ Checking src/client/package-lock.json..."
          npm ci --dry-run 2>&1
          echo "✅ Client lockfile is consistent"

      - name: Check for duplicate/conflicting dep versions
        run: |
          echo "→ Checking for version conflicts in root..."
          node scripts/check-deps.js
