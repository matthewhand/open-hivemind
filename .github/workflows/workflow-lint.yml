name: Workflow Lint

on:
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/**"
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: workflow-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run actionlint
        # pin to latest stable; @v1 floating tag can't be resolved on runners
        uses: rhysd/actionlint@v1.7.7
