name: Smoke Test
on: [pull_request]
jobs:
  smoke:
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '18'
      - run: npm install
      - run: npm run test:smoke
      - name: Fail build if smoke tests fail
        if: failure()
        run: exit 1