[build]
  command = "pnpm run build:netlify"
  functions = "dist/netlify/functions"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "development"

[functions]
  node_bundler = "esbuild"

[context.deploy-preview]
  command = "mkdir -p dist/client dist/netlify/functions && echo 'Skipped' > dist/client/index.html && echo 'exports.handler = async () => ({ statusCode: 200, body: String(200) });' > dist/netlify/functions/server.js"

[context.branch-deploy]
  command = "mkdir -p dist/client dist/netlify/functions && echo 'Skipped' > dist/client/index.html && echo 'exports.handler = async () => ({ statusCode: 200, body: String(200) });' > dist/netlify/functions/server.js"

[dev]
  command = "pnpm run dev"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
