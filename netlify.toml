[build]
  command = "npm run build:netlify"
  functions = "dist/netlify/functions"
  publish = "dist/client"

# Safely fast-path PR builds to save minutes without breaking Netlify redirect parsing
[context.deploy-preview]
  command = "mkdir -p dist/client dist/netlify/functions && echo 'Skipped PR Build' > dist/client/index.html && echo 'exports.handler = async () => ({ statusCode: 200, body: \"Skipped\" });' > dist/netlify/functions/server.js"

[context.branch-deploy]
  command = "mkdir -p dist/client dist/netlify/functions && echo 'Skipped Branch Build' > dist/client/index.html && echo 'exports.handler = async () => ({ statusCode: 200, body: \"Skipped\" });' > dist/netlify/functions/server.js"

[dev]
  command = "npm run dev"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
