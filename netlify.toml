[build]
  command = "pnpm install --no-frozen-lockfile && pnpm run build:netlify"
  functions = "dist/netlify/functions"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.15.4"

[dev]
  command = "pnpm run dev"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
