[build]
  command = "pnpm install --frozen-lockfile && pnpm run build:netlify"
  functions = "dist/netlify/functions"
  publish = "src/client/dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.25.0"

# dist/netlify/functions/server.js is already pre-bundled by esbuild
# (scripts/bundle-serverless.mjs); nft tracing only needs to pick up the
# externalized native modules (better-sqlite3, bcrypt) from node_modules.
[functions]
  node_bundler = "nft"

[dev]
  command = "npm run dev"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' data:; frame-ancestors 'none'"

# Cache immutable static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache the HTML entry point so deploys propagate immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
