# Docker Compose Override for Development
# Usage: docker-compose up -d
# This file is automatically merged with docker-compose.yml

version: '3.8'

services:
  # PostgreSQL with pgvector extension for MemVault memory provider
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hivemind-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hivemind
      POSTGRES_PASSWORD: hivemind_dev_password
      POSTGRES_DB: hivemind
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivemind -d hivemind"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching (optional, used by some providers)
  redis:
    image: redis:7-alpine
    container_name: hivemind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Qdrant vector database (alternative to pgvector, used by Mem0)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: hivemind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
