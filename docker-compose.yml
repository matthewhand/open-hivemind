services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  redis-exporter:
    image: oliver006/redis_exporter:latest
    ports:
      - '9121:9121'
    environment:
      - REDIS_ADDR=redis:6379
    restart: unless-stopped
    depends_on:
      - redis

  hivemind:
    build: .
    ports:
      - '3028:3028'
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - HTTP_ALLOW_ALL_IPS=true
      - PORT=3028
      - SESSION_SECRET=dev-session-secret-for-testing
      - JWT_SECRET=dev-jwt-secret-for-testing
      - JWT_REFRESH_SECRET=dev-jwt-refresh-secret-for-testing
      - ALLOW_TEST_BYPASS=true
      - AUTH_ENABLED=true
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3028/health']
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs

  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9091:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - hivemind

  grafana:
    image: grafana/grafana:latest
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning:ro

volumes:
  grafana-storage:
