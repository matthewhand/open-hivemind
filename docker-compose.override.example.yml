# docker-compose.override.example.yml
#
# Auxiliary services for Open Hivemind: self-hosted Mem0 memory provider.
#
# Usage:
#   cp docker-compose.override.example.yml docker-compose.override.yml
#   cp .env.mem0.example .env.mem0
#   # Edit .env.mem0 — at minimum set OPENAI_API_KEY (or switch to Ollama)
#   docker compose up -d
#
# Docker Compose automatically merges docker-compose.override.yml on top of
# docker-compose.yml, so the mem0 stack comes up alongside hivemind.
#
# Verify:
#   ./scripts/test-mem0-local.sh
#
# Mem0 API docs:  http://localhost:8888/docs
# Neo4j browser:  http://localhost:8474

services:
  # ---------------------------------------------------------------------------
  # Mem0 API server (FastAPI)
  # ---------------------------------------------------------------------------
  mem0:
    build: ./docker/mem0
    ports:
      - "127.0.0.1:8888:8000"
    env_file:
      - .env.mem0
    environment:
      - POSTGRES_HOST=mem0-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mem0
      - POSTGRES_USER=mem0
      - POSTGRES_PASSWORD=mem0secret
      - POSTGRES_COLLECTION_NAME=memories
      - NEO4J_URI=bolt://mem0-neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=mem0graph
    networks:
      - default
      - mem0_network
    depends_on:
      mem0-postgres:
        condition: service_healthy
      mem0-neo4j:
        condition: service_healthy
    volumes:
      - mem0_history:/app/history
    healthcheck:
      test: ["CMD", "curl", "-sfL", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL + pgvector (vector embeddings storage)
  # ---------------------------------------------------------------------------
  mem0-postgres:
    image: ankane/pgvector:v0.5.1
    restart: unless-stopped
    shm_size: "128mb"
    networks:
      - mem0_network
    environment:
      - POSTGRES_USER=mem0
      - POSTGRES_PASSWORD=mem0secret
      - POSTGRES_DB=mem0
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "mem0", "-U", "mem0"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mem0_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:8432:5432"

  # ---------------------------------------------------------------------------
  # Neo4j (entity relationship graph for memory associations)
  # ---------------------------------------------------------------------------
  mem0-neo4j:
    image: neo4j:5.26.4
    restart: unless-stopped
    networks:
      - mem0_network
    environment:
      - NEO4J_AUTH=neo4j/mem0graph
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s
    volumes:
      - mem0_neo4j_data:/data
    ports:
      - "127.0.0.1:8474:7474"
      - "127.0.0.1:8687:7687"

volumes:
  mem0_postgres_data:
  mem0_neo4j_data:
  mem0_history:

networks:
  mem0_network:
    driver: bridge
